detector:
  weights: models/yolo11s.pt
  imgsz: 960
  conf: 0.30
  iou: 0.5
  classes: [person, bicycle, car, motorcycle, bus, truck]
  device: auto

processing:
  target_fps: 10
  speed_factor: 1.0

signals:
  collision:
    velocity_drop_threshold: 15.0
    velocity_window_s: 0.5
    stationary_speed_threshold: 3.0
    stationary_duration_s: 3.0
    pending_expiry_s: 15.0
    initial_score: 0.6
    confirmed_score: 0.95
  rider_down:
    aspect_lying_threshold: 1.3
    sustained_duration_s: 2.0
    proximity_multiplier: 1.5
    vehicle_velocity_drop_threshold: 15.0
    vehicle_aspect_change_threshold: 0.5
    person_speed_threshold: 3.0
    event_correlation_window_s: 3.0
    primary_score: 0.85
    pose:
      enabled: true
      weights: models/yolo11s-pose.pt
      check_every_n_frames: 3
      lying_angle_deg: 60.0
      confirmed_score: 0.95
  crowd:
    eps_px: 40.0
    min_samples: 4
    formation_window_s: 8.0
    formation_growth_threshold: 4
    settled_speed_threshold: 5.0
    convergence_cos_threshold: 0.5
    formation_only_score: 0.5
    confirmed_score: 0.8
  flow:
    bin_duration_s: 10.0
    rolling_window_bins: 30
    collapse_ratio: 0.3
    min_consecutive_low_bins: 2
    fire_score: 0.4

fusion:
  weights:
    collision: 0.35
    rider_down: 0.30
    crowd: 0.20
    flow: 0.15
  candidate_threshold: 0.5
  override_rules:
    - signal: collision
      min_score: 0.9
    - signal: rider_down
      min_score: 0.85
  cooldown_seconds: 60
  cooldown_grid: [4, 4]
